version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: test-management-mysql
    environment:
      MYSQL_DATABASE: test_management
      MYSQL_USER: test
      MYSQL_PASSWORD: test
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10